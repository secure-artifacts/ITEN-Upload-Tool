            - strong [ref=e534]: 📄 优化
            - text: ：直接粘贴你已有的基础指令和随机库，可进行指令结构化改写、校验修复、同步变量名、导出 Opal 流程等。
          - listitem [ref=e535]:
            - strong [ref=e536]: 🧩 AI 扩展类型
            - text: ：两种模式 — ①「对话扩展」不依赖随机库，直接对话生成扩展值（如"给我 30 个电商场景"）；②「关联随机库扩展」可选，有库时可针对某一列做精准扩展。结果汇总到预览区，可复制或一键追加到随机库。
          - listitem [ref=e537]:
            - strong [ref=e538]: 🌍 本地化
            - text: ：将已有的基础指令和随机库一键本地化到目标国家（如日本、法国等），AI 自动翻译并适配当地文化元素。
          - listitem [ref=e539]:
            - strong [ref=e540]: 🏷️ 智能分类
            - text: ：对随机库数据进行 AI 智能分类，按维度自动归类（如室内/室外、白天/夜晚），可直接应用到代码生成。
          - listitem [ref=e541]:
            - strong [ref=e542]: 🎲 代码生成
            - text: ：包含三个子功能 ——「随机代码生成器」为每个库独立生成随机代码（支持文字列表和自定义组数）；「分类联动代码生成器」根据分类结果生成联动随机代码；「判断节点生成器」生成工作流 Code 节点的 Python 判断代码（支持中文检测、关键词匹配、长度判断等）。
      - generic [ref=e543]:
        - paragraph [ref=e544]: 3. 全局平台设置有什么用
        - list [ref=e545]:
          - listitem [ref=e546]: 页面上方的全局平台设置按钮（仅在「生成」和「优化」标签页显示）。
          - listitem [ref=e547]: 它会同时影响 AI 生成的指令框架和优化标签页中的指令结构化。
          - listitem [ref=e548]: 你可以选择平台预设（通用图片、Nano Banana Pro、通用视频），也可以自定义基础指令框架。
      - generic [ref=e549]:
        - paragraph [ref=e550]: 4. 最终可以导出什么
        - list [ref=e551]:
          - listitem [ref=e552]: 可复制基础指令。
          - listitem [ref=e553]: 可复制随机库 TSV（可直接粘贴到 Google Sheets），用于 AI 创作工具包批量写描述词。
          - listitem [ref=e554]: 可导出 Opal 流程（随机代码 + 完整指令），直接用于 Opal 工作流。
      - generic [ref=e555]:
        - paragraph [ref=e556]: 5. 🔍 仅图片自动识图（新功能）
        - list [ref=e557]:
          - listitem [ref=e558]: 当你只上传了参考图片、没有提供成品描述词时，开启此功能后系统会自动执行两阶段分析。
          - listitem [ref=e559]:
            - strong [ref=e560]: 第一阶段
            - text: ：AI 先识别每张参考图，为其生成详细的英文描述词（包含主体、场景、构图、风格、光影等细节）。
          - listitem [ref=e561]:
            - strong [ref=e562]: 第二阶段
            - text: ：将识别出的描述词作为"成品描述词样本"，再进行对比分析，提取固定骨架和可变维度，生成完整的基础指令 + 随机库。
          - listitem [ref=e563]: 此功能默认开启（推荐），你也可以在「参考图片」区域手动关闭，使用原来的纯视觉分析模式。
      - generic [ref=e564]: 一句话：这个工具可以根据你提供的成品图片和描述词（甚至只有图片），智能生成用于 Opal 工作流的指令和随机库，还支持 AI 扩展类型、本地化、智能分类和随机代码生成。